apiVersion: apps/v1
kind: Deployment
metadata:
  name: rd-cache-gateway
  namespace: automation-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rd-cache-gateway
  template:
    metadata:
      labels:
        app: rd-cache-gateway
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /config /data/downloads/rd-cache-gateway /data/downloads/torbox || true
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: app-data
              mountPath: /config
            - name: media-data
              mountPath: /data
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: media-role
                    operator: In
                    values:
                      - primary
            - weight: 50
              preference:
                matchExpressions:
                  - key: media-role
                    operator: In
                    values:
                      - secondary
      containers:
        - name: rd-cache-gateway
          image: rd-cache-gateway:local
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_DIR
              value: "/config"
            - name: IMPORT_GRACE_SECONDS
              value: "90"
            - name: QBIT_USERNAME
              value: "admin"
            - name: QBIT_PASSWORD
              value: "adminadmin"
            - name: APP_UID
              value: "1000"
            - name: APP_GID
              value: "1000"
            - name: STAGING_ROOT
              value: "/data/downloads/rd-cache-gateway"
            - name: SONARR_STAGING_ROOT
              value: "/data/downloads/rd-cache-gateway"
            - name: DEBRID_PROVIDER
              value: "torbox"
            - name: DEBRID_ALL_DIR
              value: "/data/downloads/torbox/__all__"
            - name: DEBRID_VISIBLE_ALL_DIR
              value: "/data/downloads/torbox/__all__"
            - name: WEBDAV_URL
              value: "http://127.0.0.1:8000/dav"
            - name: WEBDAV_MOUNT_CHECK_ENABLED
              value: "1"
            - name: WEBDAV_MOUNT_CHECK_DELAY
              value: "5"
            - name: WEBDAV_MOUNT_CHECK_TIMEOUT
              value: "25"
            - name: ENABLE_DEBUG_UI
              value: "1"
            - name: DEBUG_WEB_PORT
              value: "8888"
            - name: SONARR_URL
              valueFrom:
                secretKeyRef:
                  name: rd-cache-gateway-sonarr
                  key: SONARR_URL
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rd-cache-gateway-sonarr
                  key: SONARR_API_KEY
            - name: POLL_INTERVAL
              value: "5"
            - name: TORBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: torbox-secret
                  key: TORBOX_API_KEY
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8888
              name: debug
          volumeMounts:
            - name: app-data
              mountPath: /config
            - name: media-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: app-data
          hostPath:
            path: /srv/media/config/rd-cache-gateway/data
            type: DirectoryOrCreate
        - name: media-data
          hostPath:
            path: /srv/media/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: rd-cache-gateway-internal
  namespace: automation-system
spec:
  type: ClusterIP
  selector:
    app: rd-cache-gateway
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
    - name: debug
      protocol: TCP
      port: 8888
      targetPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: rd-cache-gateway
  namespace: automation-system
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.30.58
  selector:
    app: rd-cache-gateway
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
    - name: debug
      protocol: TCP
      port: 8888
      targetPort: 8888